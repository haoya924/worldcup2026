name: 寄送世足分析信

on:
  push:
    branches: [main]
    paths:
      - '**_分析.html'
      - '**_檢討.html'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 找出最新的 HTML 檔並寄信
        run: |
          LATEST=$(ls -t *_分析.html *_檢討.html 2>/dev/null | head -1)
          echo "找到檔案: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "沒有找到 HTML 檔，跳過"
            exit 0
          fi

          if echo "$LATEST" | grep -q '_分析'; then
            SUBJECT="【世足分析】台灣時間 $(TZ='Asia/Taipei' date +%m/%d) 賽程預測"
          else
            SUBJECT="【世足檢討】台灣時間 $(TZ='Asia/Taipei' date +%m/%d) 賽後分析報告"
          fi

          python3 - "$LATEST" "$SUBJECT" << 'PYEOF'
          import smtplib, sys, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          filepath = sys.argv[1]
          subject = sys.argv[2]

          with open(filepath, 'r', encoding='utf-8') as f:
              html = f.read()

          msg = MIMEMultipart('alternative')
          msg['Subject'] = subject
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['GMAIL_USER']
          msg.attach(MIMEText(html, 'html', 'utf-8'))

          with smtplib.SMTP('smtp.gmail.com', 587) as s:
              s.starttls()
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_PASS'])
              s.sendmail(os.environ['GMAIL_USER'], os.environ['GMAIL_USER'], msg.as_string())

          print('Email 寄出成功:', subject)
          PYEOF
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
