<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>豪豪世足分析 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0d3b66 100%);
      padding: 28px 20px 20px;
      text-align: center;
      border-bottom: 3px solid #e94560;
      position: relative;
    }
    .header h1 { font-size: 22px; color: #fff; letter-spacing: 1px; }
    .header .sub { color: #90b4d4; font-size: 13px; margin-top: 6px; }
    .wc-badge {
      display: inline-block; background: #e94560; color: #fff;
      font-size: 11px; font-weight: bold; padding: 2px 8px;
      border-radius: 10px; margin-left: 8px; vertical-align: middle;
    }

    /* Stats */
    .stats-wrap { background: #13132a; border-bottom: 1px solid #2a2a4e; padding: 14px 16px; overflow-x: auto; }
    .stats { display: flex; gap: 10px; min-width: max-content; margin: 0 auto; max-width: 800px; }
    .stat {
      flex: 1; min-width: 90px; background: #1a1a2e; border: 1px solid #2a2a4e;
      border-radius: 8px; padding: 10px 12px; text-align: center;
    }
    .stat .num { font-size: 22px; font-weight: bold; color: #e94560; line-height: 1; }
    .stat .num.green { color: #27ae60; }
    .stat .lbl { font-size: 11px; color: #778; margin-top: 4px; white-space: nowrap; }

    /* Container */
    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

    /* Section title */
    .section-title {
      font-size: 13px; font-weight: bold; color: #778;
      letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #2a2a4e;
    }

    /* Day card */
    .day-card {
      background: #1a1a2e; border-radius: 10px;
      margin-bottom: 12px; overflow: hidden;
      border: 1px solid #2a2a4e;
      transition: border-color 0.2s;
    }
    .day-card:hover { border-color: #0d3b66; }
    .day-header {
      background: #0d2244; padding: 11px 16px;
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
    }
    .day-date { font-weight: bold; font-size: 15px; color: #fff; white-space: nowrap; }
    .day-info { font-size: 12px; color: #6a90b4; flex: 1; min-width: 0; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .day-body { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 6px; font-size: 13px;
      text-decoration: none; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-analysis { background: #e94560; color: #fff; }
    .btn-review   { background: #27ae60; color: #fff; }
    .btn-pending  { background: #2a2a4e; color: #556; cursor: default; }
    .btn-pending:hover { opacity: 1; transform: none; }

    /* Loading / Error */
    .loading { text-align: center; padding: 50px 20px; color: #556; font-size: 14px; }
    .loading .spinner { width: 36px; height: 36px; border: 3px solid #2a2a4e; border-top-color: #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 40px; color: #e94560; font-size: 14px; }

    /* Footer */
    .footer { text-align: center; color: #445; font-size: 12px; padding: 24px 16px; }

    /* Mobile */
    @media (max-width: 500px) {
      .header h1 { font-size: 18px; }
      .stat .num { font-size: 18px; }
      .btn { font-size: 12px; padding: 6px 11px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>⚽ 豪豪世足分析 <span class="wc-badge">2026 WC</span></h1>
  <div class="sub" id="header-sub">載入中...</div>
</div>

<div class="stats-wrap">
  <div class="stats">
    <div class="stat"><div class="num" id="s-days">–</div><div class="lbl">分析天數</div></div>
    <div class="stat"><div class="num" id="s-matches">–</div><div class="lbl">比賽場次</div></div>
    <div class="stat"><div class="num green" id="s-win">–</div><div class="lbl">勝負命中</div></div>
    <div class="stat"><div class="num green" id="s-ou">–</div><div class="lbl">大小分命中</div></div>
    <div class="stat"><div class="num green" id="s-btts">–</div><div class="lbl">BTTS 命中</div></div>
    <div class="stat"><div class="num green" id="s-score">–</div><div class="lbl">比分命中</div></div>
  </div>
</div>

<div class="container">
  <div class="section-title">賽程分析紀錄</div>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      載入資料中...
    </div>
  </div>
</div>

<div class="footer">豪豪世足分析助理自動產生 · 2026 FIFA World Cup</div>

<script>
const OWNER = 'haoya924';
const REPO  = 'worldcup2026';
const RAW   = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/`;
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;
const PAGES = `https://${OWNER}.github.io/${REPO}/`;

const DAY_NAMES = ['日','一','二','三','四','五','六'];

function dateDisplay(mmdd) {
  const m = parseInt(mmdd.slice(0, 2));
  const d = parseInt(mmdd.slice(2, 4));
  const dt = new Date(2026, m - 1, d);
  return `${m}/${d}（週${DAY_NAMES[dt.getDay()]}）`;
}

function pct(correct, total) {
  if (!total) return '–';
  return `${correct}/${total}`;
}

async function load() {
  const content = document.getElementById('content');
  try {
    // 1. 取得檔案清單
    const res = await fetch(API + '?per_page=100');
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const files = await res.json();

    // 2. 分組：依 MMDD 前綴
    const days = {};
    for (const f of files) {
      if (f.type !== 'file') continue;
      const m = f.name.match(/^(\d{4})_(分析|檢討)\.html$/);
      if (!m) continue;
      const [, date, type] = m;
      if (!days[date]) days[date] = { date, analysis: null, review: null };
      days[date][type === '分析' ? 'analysis' : 'review'] = f.name;
    }

    // 3. 嘗試讀 data.json
    let data = null;
    try {
      const dr = await fetch(RAW + 'data.json?t=' + Date.now());
      if (dr.ok) data = await dr.json();
    } catch(e) {}

    // 4. 更新統計
    const sorted = Object.values(days).sort((a, b) => b.date.localeCompare(a.date));
    document.getElementById('s-days').textContent = sorted.length;

    if (data?.stats) {
      const s = data.stats;
      document.getElementById('s-matches').textContent = s.total_matches ?? '–';
      document.getElementById('s-win').textContent   = pct(s.win_correct,   s.win_total);
      document.getElementById('s-ou').textContent    = pct(s.ou_correct,    s.ou_total);
      document.getElementById('s-btts').textContent  = pct(s.btts_correct,  s.btts_total);
      document.getElementById('s-score').textContent = pct(s.score_correct, s.score_total);
    }

    // 5. 更新 header
    const newest = sorted[0];
    const hn = newest ? `最後分析：${dateDisplay(newest.date)}` : '尚無資料';
    document.getElementById('header-sub').textContent = hn + '　·　2026 FIFA World Cup';

    // 6. 渲染卡片
    if (sorted.length === 0) {
      content.innerHTML = '<div class="loading">尚無分析資料</div>';
      return;
    }

    content.innerHTML = sorted.map(day => {
      const matchNames = data?.days?.find(d => d.date === day.date)?.matches?.join(' · ') || '';
      const dd = dateDisplay(day.date);
      return `
        <div class="day-card">
          <div class="day-header">
            <span class="day-date">${dd}</span>
            ${matchNames ? `<span class="day-info">${matchNames}</span>` : ''}
          </div>
          <div class="day-body">
            ${day.analysis
              ? `<a class="btn btn-analysis" href="${PAGES}${day.analysis}" target="_blank">⚽ 賽前分析</a>`
              : `<span class="btn btn-pending">⚽ 賽前分析</span>`}
            ${day.review
              ? `<a class="btn btn-review" href="${PAGES}${day.review}" target="_blank">📊 賽後檢討</a>`
              : `<span class="btn btn-pending">📊 檢討待產生</span>`}
          </div>
        </div>`;
    }).join('');

  } catch(e) {
    content.innerHTML = `<div class="error">載入失敗：${e.message}<br><small style="color:#556;margin-top:6px;display:block">請確認 GitHub Pages 已開啟，且 repo 為公開狀態</small></div>`;
  }
}

load();
</script>
</body>
</html>
